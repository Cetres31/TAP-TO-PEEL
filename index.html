<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CET-RES-TAPES | Private Listening</title>
  <style>
    :root{
      --bg:#000;
      --white:#fff;
      --border:rgba(255,255,255,.18);
      --glass:rgba(255,255,255,.08);
      --shadow:rgba(0,0,0,.45);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family:Arial, Helvetica, sans-serif;
      color:#fff;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .page{
      position:relative;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      overflow:hidden;
    }

    .glow-bg{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at center, rgba(157,0,255,.12), transparent 28%),
        radial-gradient(circle at center, rgba(255,255,255,.05), transparent 55%);
      pointer-events:none;
    }

    .card-wrap{
      position:relative;
      width:min(82vw, 540px);
      aspect-ratio:1/1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .title-wrap{
      position:absolute;
      top:calc(50% - min(41vw, 270px) - 86px);
      left:50%;
      transform:translateX(-50%);
      text-align:center;
      z-index:50;
      width:min(90vw, 700px);
      pointer-events:none;
    }

    .glitch{
      position:relative;
      display:inline-block;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.34em;
      font-size:clamp(16px, 2vw, 28px);
      color:#fff;
      text-shadow:0 0 10px rgba(255,255,255,.12);
      animation:jitter 1.3s infinite steps(2,end);
    }

    .glitch::before,
    .glitch::after{
      content:attr(data-text);
      position:absolute;
      left:0;
      top:0;
      width:100%;
      overflow:hidden;
      opacity:.75;
    }

    .glitch::before{
      color:#00eaff;
      transform:translate(-2px,0);
      clip-path:polygon(0 0,100% 0,100% 38%,0 38%);
      animation:glitchTop 1.15s infinite steps(2,end);
    }

    .glitch::after{
      color:#ff47d1;
      transform:translate(2px,0);
      clip-path:polygon(0 62%,100% 62%,100% 100%,0 100%);
      animation:glitchBottom 0.9s infinite steps(2,end);
    }

    @keyframes jitter{
      0%,100%{transform:translate(0,0);}
      20%{transform:translate(1px,-1px);}
      40%{transform:translate(-1px,1px);}
      60%{transform:translate(1px,0);}
      80%{transform:translate(-1px,-1px);}
    }

    @keyframes glitchTop{
      0%,100%{transform:translate(-2px,0);}
      25%{transform:translate(2px,-1px);}
      50%{transform:translate(-3px,1px);}
      75%{transform:translate(1px,0);}
    }

    @keyframes glitchBottom{
      0%,100%{transform:translate(2px,0);}
      25%{transform:translate(-2px,1px);}
      50%{transform:translate(3px,-1px);}
      75%{transform:translate(-1px,0);}
    }

    .subtitle{
      margin-top:10px;
      font-size:11px;
      letter-spacing:.34em;
      text-transform:uppercase;
      color:rgba(255,255,255,.62);
    }

    .card{
      position:relative;
      width:100%;
      height:100%;
      border-radius:10px;
      overflow:hidden;
      background:#050505;
      box-shadow:
        0 28px 80px rgba(0,0,0,.58),
        0 0 0 1px rgba(255,255,255,.05);
    }

    .cover{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      pointer-events:none;
    }

    .vignette{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at center, transparent 50%, rgba(0,0,0,.16) 76%, rgba(0,0,0,.36) 100%);
      pointer-events:none;
      z-index:3;
    }

    .scanlines{
      position:absolute;
      inset:0;
      z-index:6;
      pointer-events:none;
      opacity:.28;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.08) 0px,
          rgba(255,255,255,.08) 1px,
          transparent 2px,
          transparent 4px
        );
      mix-blend-mode:screen;
      animation:scanDrift 7s linear infinite;
    }

    @keyframes scanDrift{
      0%{transform:translateY(0);}
      100%{transform:translateY(12px);}
    }

    #noise{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:7;
      pointer-events:none;
      opacity:.17;
      mix-blend-mode:screen;
    }

    .flicker{
      position:absolute;
      inset:0;
      z-index:8;
      pointer-events:none;
      background:rgba(255,255,255,.03);
      animation:flicker .16s infinite;
      mix-blend-mode:overlay;
    }

    @keyframes flicker{
      0%{opacity:.10;}
      20%{opacity:.04;}
      40%{opacity:.12;}
      60%{opacity:.03;}
      80%{opacity:.08;}
      100%{opacity:.05;}
    }

    .wrap{
      position:absolute;
      inset:0;
      z-index:20;
      overflow:hidden;
      cursor:grab;
      touch-action:none;
      border-radius:10px;
      background:
        linear-gradient(115deg,
          rgba(255,255,255,0.00) 0%,
          rgba(255,255,255,0.12) 10%,
          rgba(255,255,255,0.03) 18%,
          rgba(255,255,255,0.18) 28%,
          rgba(255,255,255,0.02) 38%,
          rgba(255,255,255,0.13) 50%,
          rgba(255,255,255,0.02) 60%,
          rgba(255,255,255,0.08) 78%,
          rgba(255,255,255,0.01) 100%
        ),
        linear-gradient(180deg,
          rgba(255,255,255,.10) 0%,
          rgba(255,255,255,.02) 12%,
          rgba(255,255,255,0) 24%,
          rgba(255,255,255,.05) 40%,
          rgba(255,255,255,0) 60%,
          rgba(255,255,255,.04) 76%,
          rgba(255,255,255,0) 100%
        );
      backdrop-filter: blur(1.2px) brightness(1.03);
      -webkit-backdrop-filter: blur(1.2px) brightness(1.03);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.14),
        inset 0 0 50px rgba(255,255,255,.04);
      transform:translateX(0);
      opacity:1;
      will-change:transform, opacity;
    }

    .wrap::before{
      content:"";
      position:absolute;
      inset:-8%;
      background:
        radial-gradient(circle at 16% 18%, rgba(255,255,255,.24), transparent 12%),
        radial-gradient(circle at 82% 20%, rgba(255,255,255,.17), transparent 10%),
        radial-gradient(circle at 78% 82%, rgba(255,255,255,.22), transparent 12%),
        radial-gradient(circle at 26% 84%, rgba(255,255,255,.14), transparent 11%),
        linear-gradient(100deg, transparent 0%, rgba(255,255,255,.12) 24%, transparent 36%),
        linear-gradient(82deg, transparent 0%, rgba(255,255,255,.10) 54%, transparent 67%);
      opacity:.96;
      mix-blend-mode:screen;
      animation:sheetMove 6s ease-in-out infinite alternate;
      pointer-events:none;
    }

    .wrap::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        repeating-linear-gradient(
          135deg,
          rgba(255,255,255,.04) 0px,
          rgba(255,255,255,.04) 2px,
          transparent 2px,
          transparent 18px
        );
      opacity:.32;
      mix-blend-mode:screen;
      pointer-events:none;
    }

    @keyframes sheetMove{
      0%{transform:translate(-1%, -1%) scale(1);}
      100%{transform:translate(1%, 1%) scale(1.025);}
    }

    .tear-edge{
      position:absolute;
      top:0;
      right:-2px;
      width:22px;
      height:100%;
      z-index:21;
      pointer-events:none;
      background:linear-gradient(to left, rgba(255,255,255,.38), rgba(255,255,255,.08), transparent);
      opacity:.72;
      filter:blur(1px);
    }

    .peel-ui{
      position:absolute;
      inset:0;
      z-index:30;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      text-align:center;
      padding:18px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:220px;
      padding:14px 22px;
      border-radius:999px;
      background:rgba(0,0,0,.42);
      color:#fff;
      border:1px solid rgba(255,255,255,.24);
      box-shadow:0 10px 28px rgba(0,0,0,.3);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      font-size:13px;
      letter-spacing:.34em;
      text-transform:uppercase;
      animation:pulse 1.4s infinite ease-in-out;
    }

    .hint{
      margin-top:12px;
      font-size:11px;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:rgba(255,255,255,.72);
      text-shadow:0 2px 10px rgba(0,0,0,.45);
    }

    .progress-wrap{
      margin-top:14px;
      width:min(280px, 62vw);
      height:6px;
      border-radius:999px;
      background:rgba(255,255,255,.18);
      overflow:hidden;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
    }

    .progress-bar{
      width:0%;
      height:100%;
      background:linear-gradient(90deg, #fff, #dca3ff);
      transition:width .04s linear;
    }

    @keyframes pulse{
      0%,100%{transform:scale(1); opacity:.92;}
      50%{transform:scale(1.03); opacity:1;}
    }

    .loading{
      position:absolute;
      left:50%;
      bottom:26px;
      transform:translateX(-50%);
      z-index:60;
      text-align:center;
      color:#fff;
      letter-spacing:.28em;
      font-size:11px;
      text-transform:uppercase;
      opacity:0;
      transition:opacity .25s ease;
      pointer-events:none;
      width:100%;
    }

    .loading.show{
      opacity:1;
    }

    .flash{
      position:absolute;
      inset:0;
      background:#fff;
      z-index:70;
      pointer-events:none;
      opacity:0;
    }

    .flash.show{
      animation:flashOut .55s ease forwards;
    }

    @keyframes flashOut{
      0%{opacity:0;}
      18%{opacity:.92;}
      100%{opacity:0;}
    }

    @media (max-width:700px){
      .card-wrap{
        width:min(88vw, 430px);
      }
      .title-wrap{
        top:calc(50% - min(44vw, 215px) - 82px);
      }
      .pill{
        min-width:190px;
        padding:12px 18px;
        font-size:11px;
      }
      .hint{
        font-size:10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="glow-bg"></div>

    <div class="title-wrap">
      <div class="glitch" data-text="PRIVATE LISTENING">PRIVATE LISTENING</div>
      <div class="subtitle">CET-RES-TAPES • SEALED ACCESS</div>
    </div>

    <div class="card-wrap" id="cardWrap">
      <div class="card" id="card">
        <img class="cover" src="cover.png" alt="CET-RES-TAPES cover" />
        <div class="vignette"></div>
        <canvas id="noise"></canvas>
        <div class="scanlines"></div>
        <div class="flicker"></div>

        <div class="wrap" id="wrap">
          <div class="tear-edge" id="tearEdge"></div>
        </div>

        <div class="peel-ui" id="peelUI">
          <div class="pill">PEEL TO UNLOCK</div>
          <div class="hint">slide right on the plastic wrap</div>
          <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>

        <div class="loading" id="loadingText">opening private bridge link...</div>
        <div class="flash" id="flash"></div>
      </div>
    </div>
  </div>

  <script>
    const BRIDGE_URL = "https://untitled.stream/library/project/b4iMouvZySXCUEJkO3y1t";

    const card = document.getElementById("card");
    const wrap = document.getElementById("wrap");
    const tearEdge = document.getElementById("tearEdge");
    const peelUI = document.getElementById("peelUI");
    const progressBar = document.getElementById("progressBar");
    const loadingText = document.getElementById("loadingText");
    const flash = document.getElementById("flash");
    const noiseCanvas = document.getElementById("noise");
    const ctx = noiseCanvas.getContext("2d", { alpha: true });

    let dragging = false;
    let pointerStartX = 0;
    let peelX = 0;
    let maxPeel = 0;
    let unlockThreshold = 0;
    let unlocked = false;

    function resizeCardThings() {
      const rect = card.getBoundingClientRect();
      noiseCanvas.width = Math.max(1, Math.floor(rect.width));
      noiseCanvas.height = Math.max(1, Math.floor(rect.height));
      maxPeel = rect.width * 0.92;
      unlockThreshold = rect.width * 0.74;
      renderPeel();
    }

    function drawNoise() {
      const w = noiseCanvas.width;
      const h = noiseCanvas.height;
      const imageData = ctx.createImageData(w, h);
      const buffer = imageData.data;

      for (let i = 0; i < buffer.length; i += 4) {
        const shade = Math.random() * 255;
        buffer[i] = shade;
        buffer[i + 1] = shade;
        buffer[i + 2] = shade;
        buffer[i + 3] = Math.random() * 38;
      }

      ctx.putImageData(imageData, 0, 0);
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function renderPeel() {
      const progress = maxPeel ? peelX / maxPeel : 0;

      wrap.style.transform = `translateX(${peelX}px) rotate(${peelX * 0.018}deg)`;
      wrap.style.opacity = `${1 - progress * 0.72}`;
      tearEdge.style.transform = `translateX(${peelX}px)`;
      progressBar.style.width = `${progress * 100}%`;

      const uiOpacity = clamp(1 - progress * 1.4, 0.08, 1);
      peelUI.style.opacity = uiOpacity;
    }

    function getClientX(event) {
      if (event.touches && event.touches[0]) return event.touches[0].clientX;
      if (event.changedTouches && event.changedTouches[0]) return event.changedTouches[0].clientX;
      return event.clientX;
    }

    function startDrag(event) {
      if (unlocked) return;

      const x = getClientX(event);
      const rect = card.getBoundingClientRect();

      if (x < rect.left || x > rect.right) return;

      dragging = true;
      pointerStartX = x - peelX;
      wrap.style.cursor = "grabbing";
      wrap.style.transition = "none";
    }

    function moveDrag(event) {
      if (!dragging || unlocked) return;

      const x = getClientX(event);
      peelX = clamp(x - pointerStartX, 0, maxPeel);
      renderPeel();
    }

    function finishUnlock() {
      if (unlocked) return;
      unlocked = true;

      peelX = maxPeel + 40;
      wrap.style.transition = "transform .75s cubic-bezier(.22,.88,.22,1), opacity .75s ease";
      renderPeel();

      loadingText.classList.add("show");
      flash.classList.add("show");

      setTimeout(() => {
        window.location.href = BRIDGE_URL;
      }, 900);
    }

    function endDrag() {
      if (!dragging || unlocked) return;
      dragging = false;
      wrap.style.cursor = "grab";

      if (peelX >= unlockThreshold) {
        finishUnlock();
      } else {
        wrap.style.transition = "transform .18s linear, opacity .18s linear";
        renderPeel();
        setTimeout(() => {
          if (!unlocked) {
            wrap.style.transition = "none";
          }
        }, 180);
      }
    }

    resizeCardThings();
    drawNoise();
    setInterval(drawNoise, 65);
    window.addEventListener("resize", resizeCardThings);

    wrap.addEventListener("mousedown", startDrag);
    window.addEventListener("mousemove", moveDrag);
    window.addEventListener("mouseup", endDrag);

    wrap.addEventListener("touchstart", startDrag, { passive: true });
    window.addEventListener("touchmove", moveDrag, { passive: true });
    window.addEventListener("touchend", endDrag, { passive: true });

    window.addEventListener("dragstart", (e) => e.preventDefault());
  </script>
</body>
</html>
